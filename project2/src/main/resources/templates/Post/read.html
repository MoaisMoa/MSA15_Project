<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/read.css}">
    <title>read</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>게시글 조회</h1>
            <div class="row"><span class="label">번호</span><span th:text="${post.no}">번호</span></div>
            <div class="row"><span class="label">제목</span><span th:text="${post.title}">제목</span></div>
            <div class="row"><span class="label">작성자</span><span th:text="${post.writer}">작성자</span></div>
            <div class="row"><span class="label">작성일</span><span th:text="${#dates.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-11</span></div>
            <div class="row"><span class="label">내용</span></div>
            <div class="content" th:text="${post.content}">내용</div>
        </div>
        
        <div class="actions">
            <a class="btn btn-edit" th:href="@{/Post/update(no=${post.no})}" href="/Post/update">수정</a>
			<a class="btn btn-list" th:href="@{/Post/list}" href="../Post/list.html">목록</a>
		</div>
    </div>
</body>
</html>
