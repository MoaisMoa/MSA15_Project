<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/update.css}">
    <title>update</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>게시글 수정</h1>
            <form th:action="@{/Post/update}" action="../Post/update.html" method="post">
                <input type="hidden" name="no" th:value="${post.no}">
                <div class="field">
                    <label for="title">제목</label>
                    <input id="title" name="title" th:value="${post.title}">
                </div>

                <div class="field">
                    <label for="writer">작성자</label>
                    <input id="writer" name="writer" th:value="${post.writer}" readonly>
                </div>

                <div class="field">
                    <label for="content">내용</label>
                    <textarea id="content" name="content" rows="10" th:text="${post.content}"></textarea>
                </div>

                <div class="actions">
                    <button class="btn btn-update" type="submit">수정</button>
                </div>
            </form>

            <form th:action="@{/Post/delete}" action="/Post/delete" method="post" class="btnporm">
                <input type="hidden" name="no" th:value="${post.no}">
                <div class="actions">
                    <button class="btn btn-delete" type="submit" onclick="return confirm('정말 삭제하시겠습니까?');">삭제</button>
                    <a class="btn btn-list" th:href="@{/Post/list}" href="/Post/list">목록</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
