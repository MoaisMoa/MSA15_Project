<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/list.css}">
    <title>list</title>
</head>
<body>
    <div class="container">
        <div class="top">
            <h1>게시글 목록</h1>
            <a class="goinsert" href="/Post/insert">게시글 쓰기</a>
        </div>
        <p class="muted" th:if="${message}" th:text="${message}"></p>
        <table>
            <thead>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>작성일</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(list)}">
                    <td colspan="4">등록된 게시글이 없습니다.</td>
                </tr>
                <tr th:each="post : ${list}">
                    <td th:text="${post.no}">1</td>
                    <td>
                        <a th:href="@{/Post/read/{no}(no=${post.no})}" th:text="${post.title}">제목</a>
                    </td>
                    <td th:text="${post.writer}">작성자</td>
                    <td th:text="${#dates.format(post.createdAt, 'yyyy-MM-dd')}">2026-03-11</td>
                </tr>
            </tbody>
        </table>
        <p><a th:href="@{/}" href="/">메인으로</a></p>
    </div>
</body>
</html>
