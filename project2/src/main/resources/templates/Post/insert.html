<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/insert.css}">
    <title>List</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>게시글 등록</h1>
            <form th:action="@{/Post/insert}" action="/Post/insert" method="post">
                <div class="field">
                    <label for="title">제목</label>
                    <input id="title" name="title" type="text" required>
                </div>
                <div class="field">
                    <label for="writer">작성자</label>
                    <input id="writer" name="writer" type="text" required>
                </div>
                <div class="field">
                    <label for="content">내용</label>
                    <input id="content" name="content" type="text" required>
                </div>
                <div class="actions">
                    <button class="btn btn-save" type="submit">등록</button>
                    <a class="btn btn-list" th:href="@{/Post/list}" href="/Post/list">목록</a>
                </div>
            </form>
        </div>
    </div>
    
</body>
</html>
