spring.application.name=project2

# MySQL 데이터베이스 연결 설정
spring.datasource.url=jdbc:mysql://localhost:3306/post?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL init scripts (schema.sql, data.sql) on startup
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# MyBatis 설정
mybatis.mapper-locations=classpath:com/moa/project2/mapper/*.xml
mybatis.type-aliases-package=com.moa.project2.dto

# JPA 설정 (옵션)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect